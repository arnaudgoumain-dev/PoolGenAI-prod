<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #f5f8f7;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: none;
  }
  #root {
    min-height: 100dvh;
  }
  .spin {
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @media print {
    /* Le rapport (#report-printable) est imbriqué dans .app via un overlay
       position:fixed. On neutralise ce fixed pour éviter la duplication de
       contenu sur plusieurs pages, et on masque le reste de l'app derrière
       avec display:none (pas visibility:hidden, qui garde les éléments
       fixed dans le flux de pagination). */
    html, body {
      height: auto !important;
      overflow: visible !important;
      background: #ffffff !important;
    }
    .app {
      max-width: 100% !important;
      min-height: auto !important;
      display: block !important;
    }
    .app > *:not(.report-print-root) {
      display: none !important;
    }
    .report-print-root {
      position: static !important;
      inset: auto !important;
      overflow: visible !important;
      height: auto !important;
    }
    #report-printable {
      max-width: 100% !important;
      padding: 0 12px !important;
      margin: 0 !important;
    }
    .no-print {
      display: none !important;
    }
  }
  #boot-loader {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0b3f3a;
    color: #eaf6f4;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    z-index: 9999;
    padding: 24px;
    text-align: center;
    box-sizing: border-box;
  }
  #boot-loader.error {
    background: #3a1414;
    align-items: flex-start;
    text-align: left;
    overflow-y: auto;
  }
  #boot-error-detail {
    margin-top: 14px;
    font-family: monospace;
    font-size: 12px;
    white-space: pre-wrap;
    word-break: break-word;
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 8px;
    width: 100%;
    box-sizing: border-box;
  }
</style>

<script>
  // Filet de s&#233;curit&#233; : si un script externe &#233;choue &#224; charger ou qu'une
  // erreur JS survient avant le rendu de l'app, on l'affiche &#224; l'&#233;cran
  // plut&#244;t que de rester bloqu&#233; sur l'&#233;cran de chargement sans explication.
  window.__bootErrors = [];
  window.addEventListener("error", function (e) {
    var msg = e.message || (e.target && e.target.src ? "&#201;chec de chargement : " + e.target.src : "Erreur inconnue");
    window.__bootErrors.push(msg);
    window.__showBootError && window.__showBootError();
  }, true);
</script>

<!-- React + ReactDOM (UMD) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Babel standalone pour transformer le JSX dans le navigateur -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script crossorigin src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>

<!-- jsPDF + html2canvas pour génération PDF rapport -->
<script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<!-- Icônes (shim local, pas de dépendance CDN fragile) -->
<script src="lucide-shim.js"></script>
<!-- v1.57.1 — Google Identity Services : remplace signInWithPopup/signInWithRedirect
     de Firebase pour la connexion Google. Ce script parle directement à
     accounts.google.com (postMessage), sans passer par l'iframe tiers de
     Firebase sur poolapp-ago.firebaseapp.com — évite le blocage du stockage
     tiers qui coupait la session 1-2s après connexion sur Chrome mobile. -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<body>
<div id="boot-loader">
  <div>Chargement&#8230;</div>
  <div id="boot-error-detail" style="display:none;"></div>
</div>
<div id="root"></div>

<script>
  window.__showBootError = function () {
    var loader = document.getElementById("boot-loader");
    var detail = document.getElementById("boot-error-detail");
    if (!loader || !detail) return;
    loader.classList.add("error");
    loader.firstElementChild.textContent = "Erreur au chargement \u2014 d\u00e9tail ci-dessous :";
    detail.style.display = "block";
    detail.textContent = window.__bootErrors.join("\n\n");
  };

  // Si rien ne s'est pass&#233; apr&#232;s 8 secondes (root toujours vide), c'est
  // qu'un script a &#233;chou&#233; sans d&#233;clencher d'erreur JS classique (ex: CDN
  // bloqu&#233;/lent). On le signale plut&#244;t que de laisser un &#233;cran fig&#233;.
  setTimeout(function () {
    var root = document.getElementById("root");
    if (root && root.children.length === 0) {
      window.__bootErrors.push(
        "Timeout : l'application n'a pas d\u00e9marr\u00e9 apr\u00e8s 8 secondes.\n" +
        "V\u00e9rifie ta connexion internet (les librairies React/Recharts se chargent depuis unpkg.com).\n" +
        "Si le probl\u00e8me persiste, v\u00e9rifie que les fichiers PoolGenAI.jsx et lucide-shim.js sont bien" +
        " pr\u00e9sents \u00e0 la racine du d\u00e9p\u00f4t GitHub."
      );
      window.__showBootError();
    }
  }, 8000);
</script>

<script>
  // ---------- Polyfill window.storage (IndexedDB) ----------
  // Reproduit l'API { get(key), set(key, value), delete(key), list(prefix) }
  // utilis&#233;e par PoolGenAI.jsx, en rempla&#231;ant le stockage propri&#233;taire Claude
  // par une vraie persistance locale au navigateur (survit &#224; la fermeture de l'app).
  (function () {
    const DB_NAME = "poolapp-db";
    const STORE_NAME = "kv";
    let dbPromise = null;

    function openDb() {
      if (dbPromise) return dbPromise;
      dbPromise = new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = () => {
          req.result.createObjectStore(STORE_NAME);
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
      return dbPromise;
    }

    async function idbGet(key) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readonly");
        const req = tx.objectStore(STORE_NAME).get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function idbSet(key, value) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).put(value, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function idbDelete(key) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).delete(key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function idbListKeys(prefix) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readonly");
        const req = tx.objectStore(STORE_NAME).getAllKeys();
        req.onsuccess = () => {
          let keys = req.result;
          if (prefix) keys = keys.filter((k) => String(k).startsWith(prefix));
          resolve(keys);
        };
        req.onerror = () => reject(req.error);
      });
    }

    window.storage = {
      async get(key) {
        try {
          const value = await idbGet(key);
          if (value === undefined) return null;
          return { key, value, shared: false };
        } catch (e) {
          return null;
        }
      },
      async set(key, value) {
        try {
          await idbSet(key, value);
          return { key, value, shared: false };
        } catch (e) {
          return null;
        }
      },
      async delete(key) {
        try {
          await idbDelete(key);
          return { key, deleted: true, shared: false };
        } catch (e) {
          return null;
        }
      },
      async list(prefix) {
        try {
          const keys = await idbListKeys(prefix);
          return { keys, prefix, shared: false };
        } catch (e) {
          return null;
        }
      },
    };
  })();
</script>

<!-- Firebase SDK (module) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithPopup, signInWithRedirect, signInWithCredential, getRedirectResult, GoogleAuthProvider, EmailAuthProvider, reauthenticateWithCredential, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, sendEmailVerification, deleteUser, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, deleteDoc, collection, getDocs, addDoc, onSnapshot, writeBatch, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAnalytics, logEvent, setUserId, setUserProperties } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";

  // v1.79.0 — Séparation dev/test/prod : la config Firebase est choisie selon
  // le hostname. PROD (app.poolgenai.com) → poolapp-ago, TEST (test.poolgenai.com)
  // → poolgenai-test, DEV (tout le reste, dont localhost) → poolgenai-dev.
  // v1.84.0 — Les 3 projets Firebase existent désormais, plus de fallback prod.
  const FIREBASE_CONFIGS = {
    prod: {
      apiKey: "AIzaSyD6itW6p938sB7Qv55-JTtnFRZtvKImz3U",
      authDomain: "poolgenai-prod.firebaseapp.com",
      projectId: "poolgenai-prod",
      storageBucket: "poolgenai-prod.firebasestorage.app",
      messagingSenderId: "242443326246",
      appId: "1:242443326246:web:a0e61e5786c4a7d7fda7e7",
      measurementId: "G-9GYM2SQX3J",
    },
    test: {
      apiKey: "AIzaSyDWSRu-Iaq4mG8ssrBUioktSprXSLSMnYo",
      authDomain: "poolgenai-test.firebaseapp.com",
      projectId: "poolgenai-test",
      storageBucket: "poolgenai-test.firebasestorage.app",
      messagingSenderId: "29427727408",
      appId: "1:29427727408:web:14cb19e2a28cbde6b0c1f5",
      measurementId: "G-084K0BMJDD",
    },
    dev: {
      apiKey: "AIzaSyA9_XUwBQME0ywvWvLjBI_-5TFZ_HbNqrI",
      authDomain: "poolgenai-dev.firebaseapp.com",
      projectId: "poolgenai-dev",
      storageBucket: "poolgenai-dev.firebasestorage.app",
      messagingSenderId: "1059394562193",
      appId: "1:1059394562193:web:bc7fccac63b244ca4c3730",
      measurementId: "G-YW3CZW6QMQ",
    },
  };

  function detectEnv() {
    const h = window.location.hostname;
    if (h === "app.poolgenai.com") return "prod";
    if (h === "test.poolgenai.com") return "test";
    return "dev"; // localhost et tout hostname non reconnu
  }

  const __env = detectEnv();
  // Filet de sécurité : si la config de l'environnement détecté n'est pas
  // encore renseignée (apiKey null), on retombe sur prod plutôt que de
  // planter au chargement — évite de casser test/dev tant que les projets
  // Firebase ne sont pas créés.
  const firebaseConfig = FIREBASE_CONFIGS[__env]?.apiKey
    ? FIREBASE_CONFIGS[__env]
    : FIREBASE_CONFIGS.prod;
  window.__poolgenaiEnv = __env;

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const analytics = getAnalytics(app);
  const googleProvider = new GoogleAuthProvider();

  window._fbAuth = auth;
  window._fbDb = db;
  window._fbGoogle = googleProvider;
  window._fbSignIn = signInWithEmailAndPassword;
  window._fbSignUp = createUserWithEmailAndPassword;
  window._fbResetPwd = sendPasswordResetEmail;
  window._fbSendEmailVerification = sendEmailVerification;
  window._fbDeleteUser = deleteUser;
  window._fbSignOut = signOut;
  window._fbDoc = doc;
  window._fbSetDoc = setDoc;
  window._fbGetDoc = getDoc;
  window._fbDeleteDoc = deleteDoc;
  window._fbCollection = collection;
  window._fbGetDocs = getDocs;
  window._fbAddDoc = addDoc;
  window._fbOnSnapshot = onSnapshot;
  window._fbWriteBatch = writeBatch;
  window._fbQuery = query;
  window._fbWhere = where;
  window._fbOrderBy = orderBy;
  window._fbOnAuth = onAuthStateChanged;
  // Analytics helpers
  window._fbLog = (eventName, params) => {
    try { logEvent(analytics, eventName, params || {}); } catch (e) {}
  };
  window._fbSetUserId = (uid) => {
    try { setUserId(analytics, uid); } catch (e) {}
  };
  window._fbSetUserProperty = (name, value) => {
    try { setUserProperties(analytics, { [name]: value }); } catch (e) {}
  };

  // Tente popup en premier, fallback redirect si bloqué (iOS Safari, etc.)
  // Ré-authentification nécessaire avant suppression de compte
  window._fbReauthGoogle = async () => {
    const { reauthenticateWithPopup } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    return reauthenticateWithPopup(auth, googleProvider);
  };

  // Ré-authentification email/mot de passe (compte requires-recent-login)
  window._fbReauthEmail = async (password) => {
    const user = auth.currentUser;
    if (!user || !user.email) throw new Error("Aucun utilisateur connecté.");
    const credential = EmailAuthProvider.credential(user.email, password);
    return reauthenticateWithCredential(user, credential);
  };

  // v1.57.1 — Connexion Google via Google Identity Services (google.accounts.oauth2),
  // au lieu de signInWithPopup/signInWithRedirect de Firebase. Les deux dépendaient
  // in fine du même authDomain (poolapp-ago.firebaseapp.com), différent du domaine
  // qui héberge l'app — Chrome 115+ bloque par défaut le stockage tiers nécessaire
  // à cet échange, ce qui donnait soit un bouton bloqué (popup), soit une session
  // qui apparaît puis disparaît en 1-2s (redirect). Le token client Google parle
  // directement à accounts.google.com via postMessage, sans passer par ce domaine
  // intermédiaire : on récupère un access_token, qu'on échange ensuite contre une
  // session Firebase via signInWithCredential.
  // v1.85.0 — BUG : ce Client ID était unique et codé en dur sur celui de PROD
  // (préfixe 781764586143 = messagingSenderId de poolapp-ago), utilisé pour TOUS
  // les environnements. Résultat : Firebase Auth de test/dev rejetait toujours la
  // connexion Google ("access_token audience is not for this project"), quel que
  // soit le réglage des origines JavaScript autorisées côté GCP — ce n'était
  // structurellement pas le bon client. Un Client ID par environnement, sélectionné
  // via __env (déjà calculé plus haut pour FIREBASE_CONFIGS).
  const GOOGLE_WEB_CLIENT_IDS = {
    prod: "242443326246-5t3ajnt5b2reo4kv57q1dnhf2sqkcv7n.apps.googleusercontent.com",
    test: "29427727408-gs9bu3mfbqt1eb4usclem214sf1t6bdo.apps.googleusercontent.com",
    dev: "1059394562193-8qliq2i8jf2tjehoabej6rgffibpb974.apps.googleusercontent.com",
  };
  const GOOGLE_WEB_CLIENT_ID = GOOGLE_WEB_CLIENT_IDS[__env] || GOOGLE_WEB_CLIENT_IDS.prod;

  window._fbSignInWithPopup = async (auth, provider) => {
    if (!window.google?.accounts?.oauth2) {
      throw new Error("Le service de connexion Google n'a pas pu se charger. Vérifie ta connexion et réessaie.");
    }
    return new Promise((resolve, reject) => {
      const client = window.google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_WEB_CLIENT_ID,
        scope: "openid email profile",
        callback: async (tokenResponse) => {
          if (!tokenResponse || tokenResponse.error) {
            reject(new Error("Échec de la connexion Google"));
            return;
          }
          try {
            const credential = GoogleAuthProvider.credential(null, tokenResponse.access_token);
            const result = await signInWithCredential(auth, credential);
            resolve(result);
          } catch (err) {
            reject(err);
          }
        },
        error_callback: (err) => {
          reject(new Error(err?.type === "popup_closed" ? "Connexion annulée" : "Échec de la connexion Google"));
        },
      });
      client.requestAccessToken();
    });
  };

  // Récupère le résultat du redirect Google au retour sur la page
  getRedirectResult(auth).then((result) => {
    if (result?.user) {
      console.log("Redirect Google OK :", result.user.email);
      // Marque comme connecté immédiatement pour éviter le flash login screen
      window._fbRedirectUser = result.user;
    }
  }).catch((err) => {
    if (err.code !== 'auth/no-auth-event') {
      console.warn("getRedirectResult error:", err.code, err.message);
    }
  });

  console.log("Firebase initialisé ✓");
</script>

<!-- Composant principal : on attend que Firebase soit prêt avant de charger l'app -->
<script>
  function loadPoolGenAIApp() {
    fetch("PoolGenAI.jsx")
      .then((res) => {
        if (!res.ok) throw new Error("Impossible de charger PoolGenAI.jsx (HTTP " + res.status + ")");
        return res.text();
      })
      .then((source) => {
        var result = Babel.transform(source, {
          presets: [["react", { runtime: "classic" }]],
        });
        // eslint-disable-next-line no-eval
        (0, eval)(result.code);
      })
      .catch((err) => {
        window.__bootErrors.push("Erreur de chargement/transformation de PoolGenAI.jsx :\n" + err.message);
        window.__showBootError();
      });
  }

  // Attend que Firebase soit initialisé (le module ES est asynchrone)
  // On poll window._fbAuth toutes les 50ms, timeout à 5s puis on charge quand même
  var _fbWait = 0;
  function waitForFirebase() {
    if (window._fbAuth || _fbWait > 100) {
      loadPoolGenAIApp();
    } else {
      _fbWait++;
      setTimeout(waitForFirebase, 50);
    }
  }
  waitForFirebase();
</script>

<!-- Service worker actif (cache offline uniquement). La détection de nouvelle
     version et le reload sont gérés exclusivement par le mécanisme version.json
     (écran bloquant non fermable, voir PoolGenAI.jsx). Le SW ne déclenche plus
     aucun reload de son côté pour éviter tout conflit entre les deux mécanismes. -->
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js").then((reg) => {
      reg.update();
    }).catch((err) => console.warn("SW registration failed:", err));
  }
</script>
