<!-- PWA manifest & ic&#244;nes -->

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #f5f8f7;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: none;
  }
  #root {
    min-height: 100dvh;
  }
  .spin {
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @media print {
    /* Le rapport (#report-printable) est imbriqué dans .app via un overlay
       position:fixed. On neutralise ce fixed pour éviter la duplication de
       contenu sur plusieurs pages, et on masque le reste de l'app derrière
       avec display:none (pas visibility:hidden, qui garde les éléments
       fixed dans le flux de pagination). */
    html, body {
      height: auto !important;
      overflow: visible !important;
      background: #ffffff !important;
    }
    .app {
      max-width: 100% !important;
      min-height: auto !important;
      display: block !important;
    }
    .app > *:not(.report-print-root) {
      display: none !important;
    }
    .report-print-root {
      position: static !important;
      inset: auto !important;
      overflow: visible !important;
      height: auto !important;
    }
    #report-printable {
      max-width: 100% !important;
      padding: 0 12px !important;
      margin: 0 !important;
    }
    .no-print {
      display: none !important;
    }
  }
  #boot-loader {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0b3f3a;
    color: #eaf6f4;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    z-index: 9999;
    padding: 24px;
    text-align: center;
    box-sizing: border-box;
  }
  #boot-loader.error {
    background: #3a1414;
    align-items: flex-start;
    text-align: left;
    overflow-y: auto;
  }
  #boot-error-detail {
    margin-top: 14px;
    font-family: monospace;
    font-size: 12px;
    white-space: pre-wrap;
    word-break: break-word;
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 8px;
    width: 100%;
    box-sizing: border-box;
  }
</style>

<script>
  // Filet de s&#233;curit&#233; : si un script externe &#233;choue &#224; charger ou qu'une
  // erreur JS survient avant le rendu de l'app, on l'affiche &#224; l'&#233;cran
  // plut&#244;t que de rester bloqu&#233; sur l'&#233;cran de chargement sans explication.
  window.__bootErrors = [];
  window.addEventListener("error", function (e) {
    var msg = e.message || (e.target && e.target.src ? "&#201;chec de chargement : " + e.target.src : "Erreur inconnue");
    window.__bootErrors.push(msg);
    window.__showBootError && window.__showBootError();
  }, true);
</script>

<!-- React + ReactDOM (UMD) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Babel standalone pour transformer le JSX dans le navigateur -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Recharts (graphique historique) -->
<script crossorigin src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script crossorigin src="https://unpkg.com/recharts@2.15.1/umd/Recharts.js"></script>
<!-- Ic&#244;nes (shim local, pas de d&#233;pendance CDN fragile) -->
<script src="lucide-shim.js"></script>

</head>
<body>
<div id="boot-loader">
  <div>Chargement&#8230;</div>
  <div id="boot-error-detail" style="display:none;"></div>
</div>
<div id="root"></div>

<script>
  window.__showBootError = function () {
    var loader = document.getElementById("boot-loader");
    var detail = document.getElementById("boot-error-detail");
    if (!loader || !detail) return;
    loader.classList.add("error");
    loader.firstElementChild.textContent = "Erreur au chargement \u2014 d\u00e9tail ci-dessous :";
    detail.style.display = "block";
    detail.textContent = window.__bootErrors.join("\n\n");
  };

  // Si rien ne s'est pass&#233; apr&#232;s 8 secondes (root toujours vide), c'est
  // qu'un script a &#233;chou&#233; sans d&#233;clencher d'erreur JS classique (ex: CDN
  // bloqu&#233;/lent). On le signale plut&#244;t que de laisser un &#233;cran fig&#233;.
  setTimeout(function () {
    var root = document.getElementById("root");
    if (root && root.children.length === 0) {
      window.__bootErrors.push(
        "Timeout : l'application n'a pas d\u00e9marr\u00e9 apr\u00e8s 8 secondes.\n" +
        "V\u00e9rifie ta connexion internet (les librairies React/Recharts se chargent depuis unpkg.com).\n" +
        "Si le probl\u00e8me persiste, v\u00e9rifie que les fichiers PoolGenAI.jsx et lucide-shim.js sont bien" +
        " pr\u00e9sents \u00e0 la racine du d\u00e9p\u00f4t GitHub."
      );
      window.__showBootError();
    }
  }, 8000);
</script>

<script>
  // ---------- Polyfill window.storage (IndexedDB) ----------
  // Reproduit l'API { get(key), set(key, value), delete(key), list(prefix) }
  // utilis&#233;e par PoolGenAI.jsx, en rempla&#231;ant le stockage propri&#233;taire Claude
  // par une vraie persistance locale au navigateur (survit &#224; la fermeture de l'app).
  (function () {
    const DB_NAME = "poolapp-db";
    const STORE_NAME = "kv";
    let dbPromise = null;

    function openDb() {
      if (dbPromise) return dbPromise;
      dbPromise = new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = () => {
          req.result.createObjectStore(STORE_NAME);
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
      return dbPromise;
    }

    async function idbGet(key) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readonly");
        const req = tx.objectStore(STORE_NAME).get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function idbSet(key, value) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).put(value, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function idbDelete(key) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).delete(key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function idbListKeys(prefix) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readonly");
        const req = tx.objectStore(STORE_NAME).getAllKeys();
        req.onsuccess = () => {
          let keys = req.result;
          if (prefix) keys = keys.filter((k) => String(k).startsWith(prefix));
          resolve(keys);
        };
        req.onerror = () => reject(req.error);
      });
    }

    window.storage = {
      async get(key) {
        try {
          const value = await idbGet(key);
          if (value === undefined) return null;
          return { key, value, shared: false };
        } catch (e) {
          return null;
        }
      },
      async set(key, value) {
        try {
          await idbSet(key, value);
          return { key, value, shared: false };
        } catch (e) {
          return null;
        }
      },
      async delete(key) {
        try {
          await idbDelete(key);
          return { key, deleted: true, shared: false };
        } catch (e) {
          return null;
        }
      },
      async list(prefix) {
        try {
          const keys = await idbListKeys(prefix);
          return { keys, prefix, shared: false };
        } catch (e) {
          return null;
        }
      },
    };
  })();
</script>

<!-- Firebase SDK (module) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, sendEmailVerification, deleteUser, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAnalytics, logEvent, setUserId, setUserProperties } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCZNXi1UPt6B69EVhd8nbTbh3YzM89Yo1s",
    authDomain: "poolapp-ago.firebaseapp.com",
    projectId: "poolapp-ago",
    storageBucket: "poolapp-ago.firebasestorage.app",
    messagingSenderId: "781764586143",
    appId: "1:781764586143:web:23bda828e4907607f1d0aa",
    measurementId: "G-0T8XX2SYTS"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const analytics = getAnalytics(app);
  const googleProvider = new GoogleAuthProvider();

  window._fbAuth = auth;
  window._fbDb = db;
  window._fbGoogle = googleProvider;
  window._fbSignIn = signInWithEmailAndPassword;
  window._fbSignUp = createUserWithEmailAndPassword;
  window._fbResetPwd = sendPasswordResetEmail;
  window._fbSendEmailVerification = sendEmailVerification;
  window._fbDeleteUser = deleteUser;
  window._fbSignOut = signOut;
  window._fbDoc = doc;
  window._fbSetDoc = setDoc;
  window._fbGetDoc = getDoc;
  window._fbDeleteDoc = deleteDoc;
  window._fbOnAuth = onAuthStateChanged;
  // Analytics helpers
  window._fbLog = (eventName, params) => {
    try { logEvent(analytics, eventName, params || {}); } catch (e) {}
  };
  window._fbSetUserId = (uid) => {
    try { setUserId(analytics, uid); } catch (e) {}
  };
  window._fbSetUserProperty = (name, value) => {
    try { setUserProperties(analytics, { [name]: value }); } catch (e) {}
  };

  // Tente popup en premier, fallback redirect si bloqué (iOS Safari, etc.)
  // Ré-authentification nécessaire avant suppression de compte
  window._fbReauthGoogle = async () => {
    const { reauthenticateWithPopup } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    return reauthenticateWithPopup(auth, googleProvider);
  };

  window._fbSignInWithPopup = async (auth, provider) => {
    try {
      return await signInWithPopup(auth, provider);
    } catch (err) {
      if (err.code === 'auth/popup-blocked' || err.code === 'auth/popup-closed-by-user' || err.code === 'auth/cancelled-popup-request') {
        // Fallback : redirect
        return signInWithRedirect(auth, provider);
      }
      throw err;
    }
  };

  // Récupère le résultat du redirect Google au retour sur la page
  getRedirectResult(auth).then((result) => {
    if (result?.user) {
      console.log("Redirect Google OK :", result.user.email);
      // Marque comme connecté immédiatement pour éviter le flash login screen
      window._fbRedirectUser = result.user;
    }
  }).catch((err) => {
    if (err.code !== 'auth/no-auth-event') {
      console.warn("getRedirectResult error:", err.code, err.message);
    }
  });

  console.log("Firebase initialisé ✓");
</script>

<!-- Composant principal : on attend que Firebase soit prêt avant de charger l'app -->
<script>
  function loadPoolApp() {
    fetch("PoolGenAI.jsx")
      .then((res) => {
        if (!res.ok) throw new Error("Impossible de charger PoolGenAI.jsx (HTTP " + res.status + ")");
        return res.text();
      })
      .then((source) => {
        var result = Babel.transform(source, {
          presets: [["react", { runtime: "classic" }]],
        });
        // eslint-disable-next-line no-eval
        (0, eval)(result.code);
      })
      .catch((err) => {
        window.__bootErrors.push("Erreur de chargement/transformation de PoolGenAI.jsx :\n" + err.message);
        window.__showBootError();
      });
  }

  // Attend que Firebase soit initialisé (le module ES est asynchrone)
  // On poll window._fbAuth toutes les 50ms, timeout à 5s puis on charge quand même
  var _fbWait = 0;
  function waitForFirebase() {
    if (window._fbAuth || _fbWait > 100) {
      loadPoolApp();
    } else {
      _fbWait++;
      setTimeout(waitForFirebase, 50);
    }
  }
  waitForFirebase();
</script>

<!-- Service worker d&#233;sactiv&#233; pour l'instant : un SW d&#233;j&#224; install&#233; sur un
     appareil peut servir une version p&#233;rim&#233;e de l'app ind&#233;finiment, ce qui
     est trop pi&#233;geux en phase de test. On le r&#233;activera une fois l'app
     stabilis&#233;e. Ce script d&#233;sinstalle aussi tout SW d&#233;j&#224; pr&#233;sent. -->
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js").then((reg) => {
      // Vérifie les mises à jour à chaque chargement
      reg.update();
      // Si une nouvelle version est disponible, elle s'active immédiatement
      reg.addEventListener("updatefound", () => {
        const newWorker = reg.installing;
        newWorker.addEventListener("statechange", () => {
          if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
            // Nouvelle version prête — recharge silencieusement
            window.location.reload();
          }
        });
      });
    }).catch((err) => console.warn("SW registration failed:", err));
  }
</script>
