<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>PoolApp</title>

<!-- PWA manifest & icônes -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0b3f3a" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="PoolApp" />

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #f5f8f7;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: none;
  }
  #root {
    min-height: 100vh;
    min-height: 100dvh;
  }
  .spin {
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  #boot-loader {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0b3f3a;
    color: #eaf6f4;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    z-index: 9999;
    padding: 24px;
    text-align: center;
    box-sizing: border-box;
  }
  #boot-loader.error {
    background: #3a1414;
    align-items: flex-start;
    text-align: left;
    overflow-y: auto;
  }
  #boot-error-detail {
    margin-top: 14px;
    font-family: monospace;
    font-size: 12px;
    white-space: pre-wrap;
    word-break: break-word;
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 8px;
    width: 100%;
    box-sizing: border-box;
  }
</style>

<script>
  // Filet de sécurité : si un script externe échoue à charger ou qu'une
  // erreur JS survient avant le rendu de l'app, on l'affiche à l'écran
  // plutôt que de rester bloqué sur l'écran de chargement sans explication.
  window.__bootErrors = [];
  window.addEventListener("error", function (e) {
    var msg = e.message || (e.target && e.target.src ? "Échec de chargement : " + e.target.src : "Erreur inconnue");
    window.__bootErrors.push(msg);
    window.__showBootError && window.__showBootError();
  }, true);
</script>

<!-- React + ReactDOM (UMD) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Babel standalone pour transformer le JSX dans le navigateur -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Recharts (graphique historique) -->
<script crossorigin src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script crossorigin src="https://unpkg.com/recharts@2.15.1/umd/Recharts.js"></script>
<!-- Icônes (shim local, pas de dépendance CDN fragile) -->
<script src="lucide-shim.js"></script>

</head>
<body>
<div id="boot-loader">
  <div>Chargement…</div>
  <div id="boot-error-detail" style="display:none;"></div>
</div>
<div id="root"></div>

<script>
  window.__showBootError = function () {
    var loader = document.getElementById("boot-loader");
    var detail = document.getElementById("boot-error-detail");
    if (!loader || !detail) return;
    loader.classList.add("error");
    loader.firstElementChild.textContent = "Erreur au chargement — détail ci-dessous :";
    detail.style.display = "block";
    detail.textContent = window.__bootErrors.join("\n\n");
  };

  // Si rien ne s'est passé après 8 secondes (root toujours vide), c'est
  // qu'un script a échoué sans déclencher d'erreur JS classique (ex: CDN
  // bloqué/lent). On le signale plutôt que de laisser un écran figé.
  setTimeout(function () {
    var root = document.getElementById("root");
    if (root && root.children.length === 0) {
      window.__bootErrors.push(
        "Timeout : l'application n'a pas démarré après 8 secondes.\n" +
        "Vérifie ta connexion internet (les librairies React/Recharts se chargent depuis unpkg.com).\n" +
        "Si le problème persiste, vérifie que les fichiers PoolApp.jsx et lucide-shim.js sont bien" +
        " présents à la racine du dépôt GitHub."
      );
      window.__showBootError();
    }
  }, 8000);
</script>

<script>
  // ---------- Polyfill window.storage (IndexedDB) ----------
  // Reproduit l'API { get(key), set(key, value), delete(key), list(prefix) }
  // utilisée par PoolApp.jsx, en remplaçant le stockage propriétaire Claude
  // par une vraie persistance locale au navigateur (survit à la fermeture de l'app).
  (function () {
    const DB_NAME = "poolapp-db";
    const STORE_NAME = "kv";
    let dbPromise = null;

    function openDb() {
      if (dbPromise) return dbPromise;
      dbPromise = new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = () => {
          req.result.createObjectStore(STORE_NAME);
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
      return dbPromise;
    }

    async function idbGet(key) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readonly");
        const req = tx.objectStore(STORE_NAME).get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function idbSet(key, value) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).put(value, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function idbDelete(key) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).delete(key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function idbListKeys(prefix) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readonly");
        const req = tx.objectStore(STORE_NAME).getAllKeys();
        req.onsuccess = () => {
          let keys = req.result;
          if (prefix) keys = keys.filter((k) => String(k).startsWith(prefix));
          resolve(keys);
        };
        req.onerror = () => reject(req.error);
      });
    }

    window.storage = {
      async get(key) {
        try {
          const value = await idbGet(key);
          if (value === undefined) return null;
          return { key, value, shared: false };
        } catch (e) {
          return null;
        }
      },
      async set(key, value) {
        try {
          await idbSet(key, value);
          return { key, value, shared: false };
        } catch (e) {
          return null;
        }
      },
      async delete(key) {
        try {
          await idbDelete(key);
          return { key, deleted: true, shared: false };
        } catch (e) {
          return null;
        }
      },
      async list(prefix) {
        try {
          const keys = await idbListKeys(prefix);
          return { keys, prefix, shared: false };
        } catch (e) {
          return null;
        }
      },
    };
  })();
</script>

<!-- Composant principal + point d'entrée (transformé par Babel au chargement) -->
<script type="text/babel" data-presets="react" src="PoolApp.jsx"></script>

<!-- Service worker désactivé pour l'instant : un SW déjà installé sur un
     appareil peut servir une version périmée de l'app indéfiniment, ce qui
     est trop piégeux en phase de test. On le réactivera une fois l'app
     stabilisée. Ce script désinstalle aussi tout SW déjà présent. -->
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.getRegistrations().then((regs) => {
      regs.forEach((reg) => reg.unregister());
    });
    if (window.caches) {
      caches.keys().then((keys) => keys.forEach((k) => caches.delete(k)));
    }
  }
</script>

</body>
</html>
